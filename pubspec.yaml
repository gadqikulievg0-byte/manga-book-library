name: Chitalka
description: Manga and book library reader
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.6.6
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  file_picker: ^8.0.7
  path_provider: ^2.1.4
  image_picker: ^1.1.2
  path: ^1.9.0
  syncfusion_flutter_pdfviewer: ^23.2.7
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  msix: ^3.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true